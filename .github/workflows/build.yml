name: Build ELF Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies for tkinter
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk tk-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build ELF with PyInstaller
      run: |
        pyinstaller --onefile --name tables_merge tables_merge.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tables_merge-elf
        path: dist/tables_merge
        retention-days: 5
